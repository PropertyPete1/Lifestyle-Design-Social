version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: autoposting_db
    environment:
      POSTGRES_DB: autoposting
      POSTGRES_USER: autoposting_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/scripts/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - autoposting_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: autoposting_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - autoposting_network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: autoposting_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://autoposting_user:${DB_PASSWORD}@postgres:5432/autoposting
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID}
      INSTAGRAM_CLIENT_SECRET: ${INSTAGRAM_CLIENT_SECRET}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    networks:
      - autoposting_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: autoposting_frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - autoposting_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: autoposting_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - autoposting_network
    restart: unless-stopped

  # Background Jobs Worker
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: autoposting_worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://autoposting_user:${DB_PASSWORD}@postgres:5432/autoposting
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID}
      INSTAGRAM_CLIENT_SECRET: ${INSTAGRAM_CLIENT_SECRET}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: npm run worker
    depends_on:
      - postgres
      - redis
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    networks:
      - autoposting_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  autoposting_network:
    driver: bridge 