services:
  - type: web
    name: lifestyle-design-social-backend
    runtime: node
    plan: free
    branch: main
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
    healthCheckPath: /api/health 